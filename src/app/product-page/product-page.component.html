<div class="search">
  <input type="text" #searchInput placeholder="產品名稱查詢" />
  <button type="button" (click)="onSearch(searchInput.value)">查詢</button>
</div>
<app-product-card-list [products]="products()" (view)="onView($event)"></app-product-card-list>
<app-pagination [(pageIndex)]="pageIndex" [pageSize]="pageSize()" [totalCount]="totalCount()"></app-pagination>
