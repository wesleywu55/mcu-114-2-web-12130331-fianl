<div class="cart-page">
  <div class="layout-container">
    <!-- 左側：基本資料 -->
    <div class="section base-info">
      <div class="section-header">基本資料</div>
      <div class="section-body">
        <div class="form-row">
          <label>姓名</label>
          <input type="text" [(ngModel)]="name" />
          <span class="error-msg" [style.visibility]="!name ? 'visible' : 'hidden'">請輸入姓名</span>
        </div>
        <div class="form-row">
          <label>地址</label>
          <input type="text" [(ngModel)]="address" />
          <span class="error-msg" [style.visibility]="!address ? 'visible' : 'hidden'">請輸入地址</span>
        </div>
        <div class="form-row">
          <label>電話</label>
          <input type="text" [(ngModel)]="phone" />
          <span class="error-msg" [style.visibility]="!phone ? 'visible' : 'hidden'">請輸入電話</span>
        </div>
      </div>
    </div>

    <!-- 右側：購買項目 -->
    <div class="section purchase-items">
      <div class="section-header">購買項目</div>
      <div class="section-body">
        @for (item of cartService.items(); track item.product.id) {
        <div class="cart-item">
          <span class="idx">{{ $index + 1 }}</span>
          <span class="name">{{ item.product.name }}</span>
          <div class="qty">
            <input type="number" [ngModel]="item.quantity" (ngModelChange)="cartService.updateQuantity(item.product.id, $event)" />
          </div>
          <span class="price">{{ item.product.price * item.quantity | currency : '$' : 'symbol' : '1.2-2' }}</span>
          <button class="del-btn" (click)="cartService.removeProduct(item.product.id)">刪除</button>
        </div>
        }
      </div>
    </div>
  </div>

  <div class="action-footer">
    <button class="submit-btn" [disabled]="!name || !address || !phone || cartService.items().length === 0" (click)="onSubmit()">
      送出訂單 ({{ cartService.totalPrice() | currency : '$' : 'symbol' : '1.2-2' }})
    </button>
  </div>
</div>
