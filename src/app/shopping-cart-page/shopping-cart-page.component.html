<form class="cart-page" [formGroup]="checkoutForm" (ngSubmit)="onSubmit()">
  <div class="layout-container">
    <!-- 左側：基本資料 -->
    <div class="section base-info">
      <div class="section-header">基本資料</div>
      <div class="section-body">
        <div class="form-row">
          <label for="customer-name">姓名</label>
          <input id="customer-name" type="text" formControlName="name" />
          <span
            class="error-msg"
            [style.visibility]="checkoutForm.controls.name.touched && checkoutForm.controls.name.invalid ? 'visible' : 'hidden'"
          >
            請輸入姓名
          </span>
        </div>
        <div class="form-row">
          <label for="customer-address">地址</label>
          <input id="customer-address" type="text" formControlName="address" />
          <span
            class="error-msg"
            [style.visibility]="checkoutForm.controls.address.touched && checkoutForm.controls.address.invalid ? 'visible' : 'hidden'"
          >
            請輸入地址
          </span>
        </div>
        <div class="form-row">
          <label for="customer-phone">電話</label>
          <input id="customer-phone" type="text" formControlName="phone" />
          <span
            class="error-msg"
            [style.visibility]="checkoutForm.controls.phone.touched && checkoutForm.controls.phone.invalid ? 'visible' : 'hidden'"
          >
            請輸入電話
          </span>
        </div>
      </div>
    </div>

    <!-- 右側：購買項目 -->
    <div class="section purchase-items">
      <div class="section-header">購買項目</div>
      <div class="section-body">
        @for (item of cartService.items(); track item.product.id) {
        <div class="cart-item">
          <span class="idx">{{ $index + 1 }}</span>
          <span class="name">{{ item.product.name }}</span>
          <div class="qty">
            <input
              type="number"
              [value]="item.quantity"
              (input)="cartService.updateQuantity(item.product.id, +$any($event.target).value)"
            />
          </div>
          <span class="price">{{ item.product.price * item.quantity | currency : '$' : 'symbol' : '1.2-2' }}</span>
          <button class="del-btn" type="button" (click)="cartService.removeProduct(item.product.id)">刪除</button>
        </div>
        }
      </div>
    </div>
  </div>

  <div class="action-footer">
    <button class="submit-btn" type="submit" [disabled]="checkoutForm.invalid || cartService.items().length === 0">
      送出訂單 ({{ cartService.totalPrice() | currency : '$' : 'symbol' : '1.2-2' }})
    </button>
  </div>
</form>
