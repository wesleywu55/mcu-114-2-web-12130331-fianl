<img [src]="photoUrl()" />
<div class="content">
  <strong [class.discount]="hasSpecialPrice()">{{ productName() }}</strong>
</div>
<div>
  @for (author of authors(); track $index) {
  <span>{{ author }}</span>
  @if (!$last) {
  <span>、</span>
  } }
</div>
<div class="company">
  <span>{{ company() }}</span>
  <span>{{ displayPrice() | currency : '$' : 'symbol' : '4.2' }}</span>
</div>
<div class="button">
  <button type="button" (click)="view.emit()">明細</button>
  <div>
    <button type="button" class="add-to-cart" (click)="onAddToCart()">加入購物車</button>
  </div>
</div>
